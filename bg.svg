<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" aria-hidden="true" focusable="false">
  <!--
    AI4Accessibility — Neural Network Background
    Composition: 35 nodes spread across a 1600×900 canvas forming an organic
    spanning network. Hub nodes (yellow-gold #ffe066) represent AI "attention"
    points; regular nodes (white) are secondary vertices; cyan (#66d9ff) edges
    represent connections / data flow. All elements are very low opacity so
    the overlaid text reads at 21:1 contrast through the dark overlay.

    Visual description for blind developer review:
      • Background: near-black with a faint blue-black undertone (#03030a)
      • Network spans the full canvas — no empty corners
      • 12 accent (yellow-gold) hub nodes are slightly larger and brighter
      • 22 regular (white) nodes at smaller radii and lower opacity
      • 55+ connection lines in translucent cyan
      • 7 soft radial glows behind hub nodes — barely perceptible warmth
      • No text, no faces, no UI chrome
  -->

  <!-- Canvas background -->
  <rect width="1600" height="900" fill="#03030a"/>

  <!-- ─── Connection lines — cyan, 1px, 8% opacity ─────────────────── -->
  <g stroke="#66d9ff" stroke-width="1" fill="none" opacity="0.08">

    <!-- Top row (left → right) -->
    <line x1="80"  y1="60"  x2="300" y2="40"/>
    <line x1="300" y1="40"  x2="520" y2="120"/>
    <line x1="520" y1="120" x2="740" y2="50"/>
    <line x1="740" y1="50"  x2="960" y2="100"/>
    <line x1="960" y1="100" x2="1180" y2="60"/>
    <line x1="1180" y1="60" x2="1420" y2="130"/>
    <line x1="1420" y1="130" x2="1580" y2="260"/>

    <!-- Upper-mid row (right → left) -->
    <line x1="1580" y1="260" x2="1460" y2="390"/>
    <line x1="1460" y1="390" x2="1220" y2="320"/>
    <line x1="1220" y1="320" x2="980"  y2="240"/>
    <line x1="980"  y1="240" x2="750"  y2="310"/>
    <line x1="750"  y1="310" x2="510"  y2="250"/>
    <line x1="510"  y1="250" x2="270"  y2="320"/>
    <line x1="270"  y1="320" x2="60"   y2="420"/>

    <!-- Mid row (left → right) -->
    <line x1="60"   y1="420" x2="180"  y2="540"/>
    <line x1="180"  y1="540" x2="420"  y2="490"/>
    <line x1="420"  y1="490" x2="660"  y2="560"/>
    <line x1="660"  y1="560" x2="890"  y2="460"/>
    <line x1="890"  y1="460" x2="1120" y2="510"/>
    <line x1="1120" y1="510" x2="1360" y2="450"/>
    <line x1="1360" y1="450" x2="1580" y2="540"/>

    <!-- Lower-mid row (right → left) -->
    <line x1="1580" y1="540" x2="1500" y2="690"/>
    <line x1="1500" y1="690" x2="1270" y2="720"/>
    <line x1="1270" y1="720" x2="1020" y2="680"/>
    <line x1="1020" y1="680" x2="780"  y2="750"/>
    <line x1="780"  y1="750" x2="540"  y2="720"/>
    <line x1="540"  y1="720" x2="310"  y2="760"/>
    <line x1="310"  y1="760" x2="100"  y2="700"/>

    <!-- Bottom row (left → right) -->
    <line x1="100"  y1="700" x2="50"   y2="860"/>
    <line x1="50"   y1="860" x2="300"  y2="870"/>
    <line x1="300"  y1="870" x2="600"  y2="900"/>
    <line x1="600"  y1="900" x2="850"  y2="870"/>
    <line x1="850"  y1="870" x2="1100" y2="890"/>
    <line x1="1100" y1="890" x2="1400" y2="850"/>

    <!-- Cross-connections — vertical and diagonal shortcuts -->
    <line x1="80"   y1="60"  x2="270"  y2="320"/>
    <line x1="300"  y1="40"  x2="510"  y2="250"/>
    <line x1="520"  y1="120" x2="510"  y2="250"/>
    <line x1="960"  y1="100" x2="980"  y2="240"/>
    <line x1="1180" y1="60"  x2="1220" y2="320"/>
    <line x1="1420" y1="130" x2="1460" y2="390"/>
    <line x1="1460" y1="390" x2="1360" y2="450"/>
    <line x1="1220" y1="320" x2="1120" y2="510"/>
    <line x1="980"  y1="240" x2="890"  y2="460"/>
    <line x1="750"  y1="310" x2="660"  y2="560"/>
    <line x1="750"  y1="310" x2="890"  y2="460"/>
    <line x1="510"  y1="250" x2="420"  y2="490"/>
    <line x1="510"  y1="250" x2="660"  y2="560"/>
    <line x1="270"  y1="320" x2="180"  y2="540"/>
    <line x1="180"  y1="540" x2="100"  y2="700"/>
    <line x1="420"  y1="490" x2="310"  y2="760"/>
    <line x1="420"  y1="490" x2="540"  y2="720"/>
    <line x1="660"  y1="560" x2="540"  y2="720"/>
    <line x1="660"  y1="560" x2="780"  y2="750"/>
    <line x1="890"  y1="460" x2="1020" y2="680"/>
    <line x1="1120" y1="510" x2="1270" y2="720"/>
    <line x1="1360" y1="450" x2="1500" y2="690"/>
    <line x1="1020" y1="680" x2="1100" y2="890"/>
    <line x1="780"  y1="750" x2="850"  y2="870"/>
    <line x1="540"  y1="720" x2="600"  y2="900"/>
    <line x1="310"  y1="760" x2="300"  y2="870"/>
    <line x1="1270" y1="720" x2="1400" y2="850"/>
    <line x1="1020" y1="680" x2="850"  y2="870"/>
  </g>

  <!-- ─── Soft radial glows at hub nodes — barely perceptible warmth ── -->
  <g opacity="0.05">
    <ellipse cx="750"  cy="310" rx="150" ry="95"  fill="#ffe066"/>
    <ellipse cx="660"  cy="560" rx="140" ry="88"  fill="#66d9ff"/>
    <ellipse cx="890"  cy="460" rx="130" ry="82"  fill="#ffe066"/>
    <ellipse cx="510"  cy="250" rx="105" ry="72"  fill="#66d9ff"/>
    <ellipse cx="1120" cy="510" rx="110" ry="72"  fill="#ffe066"/>
    <ellipse cx="780"  cy="750" rx="115" ry="72"  fill="#66d9ff"/>
    <ellipse cx="960"  cy="100" rx="95"  ry="62"  fill="#ffe066"/>
  </g>

  <!-- ─── Regular nodes — white, 16% opacity ───────────────────────── -->
  <g fill="white" opacity="0.16">
    <circle cx="80"   cy="60"  r="3"/>
    <circle cx="300"  cy="40"  r="3"/>
    <circle cx="740"  cy="50"  r="3"/>
    <circle cx="1180" cy="60"  r="3"/>
    <circle cx="1420" cy="130" r="3.5"/>
    <circle cx="1580" cy="260" r="3.5"/>
    <circle cx="1460" cy="390" r="3"/>
    <circle cx="1220" cy="320" r="3"/>
    <circle cx="270"  cy="320" r="3"/>
    <circle cx="60"   cy="420" r="3"/>
    <circle cx="180"  cy="540" r="3.5"/>
    <circle cx="1360" cy="450" r="3"/>
    <circle cx="1580" cy="540" r="3"/>
    <circle cx="1500" cy="690" r="3"/>
    <circle cx="1270" cy="720" r="3"/>
    <circle cx="100"  cy="700" r="3.5"/>
    <circle cx="50"   cy="860" r="3"/>
    <circle cx="300"  cy="870" r="3"/>
    <circle cx="600"  cy="900" r="3"/>
    <circle cx="850"  cy="870" r="3"/>
    <circle cx="1100" cy="890" r="3"/>
    <circle cx="1400" cy="850" r="3.5"/>
  </g>

  <!-- ─── Accent hub nodes — yellow-gold (#ffe066), 28% opacity ─────── -->
  <g fill="#ffe066" opacity="0.28">
    <circle cx="520"  cy="120" r="4"/>
    <circle cx="960"  cy="100" r="4.5"/>
    <circle cx="510"  cy="250" r="5"/>
    <circle cx="750"  cy="310" r="5.5"/>
    <circle cx="980"  cy="240" r="4"/>
    <circle cx="420"  cy="490" r="4"/>
    <circle cx="660"  cy="560" r="5.5"/>
    <circle cx="890"  cy="460" r="5"/>
    <circle cx="1020" cy="680" r="4"/>
    <circle cx="780"  cy="750" r="4.5"/>
    <circle cx="540"  cy="720" r="4"/>
    <circle cx="1120" cy="510" r="4.5"/>
  </g>
</svg>
